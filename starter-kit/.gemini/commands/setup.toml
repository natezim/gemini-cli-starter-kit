description = "Rebuild project context from scratch"
prompt = """
The user wants to rebuild their project context.

Scan what exists:
  - Read every file in context/ (READ-ONLY)
  - Read .env.example for available connections (NEVER read .env)
  - Check output/queries/ for saved SQL
  - Check .gemini/skills/ for installed skills
  - Check .gemini/agents/ for installed subagents
  - Glance at root for project files (package.json, requirements.txt, etc.)

Summarize what you found in a short readout.

Ask only what you actually can't infer from the files. If files make it clear,
skip the question. Aim for the minimum viable context — the user can
/context:update later. No forced question count.

Rewrite CONTEXT.md from what you found and what they answered. Show a short
summary. Ask: "Does this capture it? Anything wrong or missing?" Apply
corrections.

Say: "Context updated."
"""
