description = "Redo project context from scratch — re-interviews you and rewrites CONTEXT.md"
prompt = """
The user wants to rebuild their project context.

Scan everything: context/ files, .env variable names (not values), queries/.
Summarize what you found.

Ask only what's missing. One question at a time:
1. What's this project and what does the end result look like?
2. Walk me through your stack. (If .env exists, list variable names and ask what they connect to)
3. Any gotchas, fragile systems, or things to never touch?
4. What are you focused on right now?

Skip questions you can answer from files. Confirm each answer.

Rewrite CONTEXT.md. Show a summary, ask for corrections.
Say: "Context updated. Run /init to start."
"""
