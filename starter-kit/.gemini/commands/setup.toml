description = "First-time setup — scans what exists, asks smart questions, writes CONTEXT.md"
prompt = """
Scan everything: context/ files, .env variable names (not values), queries/.

Summarize what you found. Then ask only what's missing — skip what you already know.
If .env exists, list the variable names and ask: "What do these connect to?"

Default questions (skip any you can answer from files):
1. What's this project and what does the end result look like?
2. Walk me through your stack — tools, services, databases, and how they connect.
3. What does a typical work session look like?
4. What's bitten you before? Gotchas, fragile systems, things to never touch?
5. How do you know a task is done?
6. What are you focused on right now?

One question at a time. Confirm each answer.

Write CONTEXT.md with everything. Show a summary, ask for corrections.
Say: "Done. Run /init to start."
"""
