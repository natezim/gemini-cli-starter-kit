description = "Rebuild project context from scratch"
prompt = """
The user wants to rebuild their project context.

Scan everything:
  - Read every file in context/
  - List .env variable names (not values)
  - Check queries/ for saved SQL
  - Check .gemini/skills/ for available skills
  - Look at project files in the root (package.json, requirements.txt, docker-compose, etc.)

Summarize what you found.

Generate targeted questions based on what's MISSING from your understanding.
Do not use a hardcoded question list. Each question should reference what you discovered.
Ask one at a time. After each answer, decide if you need another or have enough.

Rewrite CONTEXT.md with whatever sections make sense for this project.
Show a summary. Ask: "Does this capture it? Anything wrong or missing?"
Apply corrections.

Say: "Context updated."
"""
