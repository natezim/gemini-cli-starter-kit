description = "Add a discovery or note to CONTEXT.md permanently"
prompt = """
Read CONTEXT.md to understand what's already documented.

Ask the user what they want to add. Base your question on what's currently
in CONTEXT.md — reference specific sections or gaps you see.
Do not use a generic question. Make it specific to this project's context.

Once answered:
- Identify the best section in CONTEXT.md for this addition (or create one if needed).
- Append the new entry with today's date.
- Show the user exactly what was added and confirm.
"""
