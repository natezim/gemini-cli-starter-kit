description = "Session start — loads context, gives a quick status, asks what you're doing today"
prompt = """
Start a new session.

1. Read ./CONTEXT.md. If it's missing or just placeholders, say "Run /setup first." and stop.

2. Silently load context:
   - Read ./CONTEXT.md
   - Scan ./context/ for files
   - Check ./output/session-log.md for recent entries (if it exists)
   - Run /memory show

3. Give a brief status — 3-4 lines max:
   - Project and current focus (from CONTEXT.md)
   - Anything new in context/ since last session
   - Any relevant memory or recent session history
   - Skip anything that doesn't exist yet — don't mention empty logs or missing history

4. Ask one question: "What are we working on today?"

5. Once answered, write ./SESSION.md:
   # Session — [DATE]
   ## Goal
   <their answer>
   ## Context
   <relevant details from what you loaded>

6. Say: "Ready. What's first?"
"""
