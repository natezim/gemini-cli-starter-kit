description = "Session start — loads everything, gives a status, asks what you're doing"
prompt = """
Silently load: CONTEXT.md, context/ files, queries/, session-log, /memory show.
Check if .env exists (don't read values).

If CONTEXT.md is missing or just placeholders, run the /setup flow directly — don't stop.

Give a compact status:
- Project and current focus
- What's in context/ (what each file covers, not just names)
- Available queries (list names from queries/)
- If .env exists: "Environment variables available — I'll ask before using them"
- Recent session history or memory (if any)
Skip anything that doesn't exist. No empty sections.

Ask: "What are we working on?"

Write SESSION.md with their answer. Say: "Ready."
"""
