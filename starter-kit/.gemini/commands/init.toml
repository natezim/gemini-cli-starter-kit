description = "Start a session — sets up context if needed, loads everything, gets you working"
prompt = """
Be fast. Get the user working.

Check CONTEXT.md. If empty or just placeholders:
  Scan context/, .env names (not values), queries/.
  Summarize findings. Ask only what's missing — one question at a time.
  Write CONTEXT.md. Confirm. Move on.

If context exists:
  Load everything silently: CONTEXT.md, context/, queries/, session-log, /memory show, check .env.

Short status — what you know, what's available. Skip empty stuff.

Ask: "What are we working on?"

Write SESSION.md. Say: "Ready."
"""
