description = "Start a session — resumes previous work, sets up context if needed, gets you working"
prompt = """
Be fast. Get the user working.

Check CONTEXT.md. If empty or just placeholders, run first-time setup (below).
If context exists, skip to returning session (below).

--- FIRST-TIME SETUP ---

Scan everything that exists:
  - Read every file in context/
  - List .env variable names (not values)
  - Check queries/ for saved SQL
  - Check .gemini/skills/ for available skills
  - Look at any project files in the root (package.json, requirements.txt, docker-compose, etc.)

Build a mental model of what you know about this project and what you DON'T know.

Generate 3-5 targeted questions based only on the gaps in YOUR understanding of THIS project.
Every question must reference something specific you found or something specific you're missing.
Do not use generic questions. Do not use example questions from this prompt.
Ask one at a time. After each answer, decide: do I need more or am I good?
Stop when you have a clear picture.

Write CONTEXT.md with whatever sections make sense for THIS project.
Show a summary and confirm with the user.

After context is confirmed, run /help to show the user everything that's available.
Then ask: "What are we working on?"

--- RETURNING SESSION ---

Load everything silently: CONTEXT.md, context/, queries/, skills/, session-log, /memory show, check .env.

Check for the most recent handoff doc in output/ (files matching *_handoff.md).

If a handoff exists, read it and give a status that includes:
  - What was done last session
  - What was left open/unfinished
  - What was flagged to carry forward
  Then ask: "Want to pick up where you left off, or start something new?"

If no handoff exists, give a short status and ask: "What are we working on?"

Say: "Ready."
"""
