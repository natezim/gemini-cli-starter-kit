description = "Start a session — captures user identity, snapshots files, loads context"
prompt = """
--- SESSION START (always run first, silent) ---

1. Identify the user: parse the working directory path. Extract the username from
   `C:\\Users\\<username>\\...`. If unclear, fall back to %USERNAME%. Hold this in
   working state for the session — every audit log entry uses it.

2. Snapshot file list (used by /session:save to detect modified files):
   List files in ./output/code/, ./output/reports/, ./output/queries/ and hold in
   working state. Do NOT write this to /memory — it's transient.

3. If anything is left in ./output/temp/ from a prior crashed session, empty it.

(No audit log entry for session start — session boundaries are not state changes.)

--- THEN check CONTEXT.md ---

Empty or placeholders → run FIRST-TIME SETUP.
Otherwise → run RETURNING SESSION.

--- FIRST-TIME SETUP ---

Scan what exists:
  - Read every file in context/ (READ-ONLY)
  - Read .env.example for available connections (NEVER read .env)
  - Check output/queries/ for saved SQL
  - Check .gemini/skills/ for installed skills
  - Glance at root for project files (package.json, requirements.txt, etc.)

Tell the user what you found in a short summary.

Ask only what you actually can't infer from the files. If files make it clear,
skip the question. Aim for the minimum viable context — you can /context:update later.
Examples (only if relevant):
  - "Which DB do you use most — DATABASE_URL or BIGQUERY_PROJECT?"
  - "I don't see anything about [topic] — quick note?"

Write CONTEXT.md from what you found and what they answered. Show a short summary.
Then run /info and ask: "What are we working on?"

--- RETURNING SESSION ---

Load silently: CONTEXT.md, context/ (READ-ONLY), output/queries/, skills/, /memory show.
Check .env.example for available connections (NEVER read .env).

Look for the most recent ./output/*_handoff.md.

If a handoff exists, read it and give a short status:
  - What was done last session
  - What's open / unfinished
  - What was flagged to carry forward
Then ask: "Pick up where you left off, or start something new?"

If no handoff: short status, then "What are we working on?"

End with: "Ready."
"""
