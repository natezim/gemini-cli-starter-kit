description = "Instant session start — loads context silently, ready immediately"
prompt = """
1. Read ./CONTEXT.md silently. If it's missing or just placeholders, run the /setup flow directly.
2. Scan ./context/ and ./queries/ silently. Note if .env exists but don't read it.
3. Ask: "What are we doing?"
4. Once answered, write a minimal ./SESSION.md:
   # Session — [DATE]
   ## Goal
   <their answer>
5. Say: "Got it. Let's go."
"""
