description = "End of session — versioning, temp wipe, chat log, handoff doc"
prompt = """
The session is ending. Run these in order. Silent unless a step truly needs input.

--- 1. VERSIONING ---

For files in ./output/code/, ./output/reports/, ./output/queries/ that EXISTED
at session start AND were modified this session (mtime > session start):

  Rotate snapshots:
    - <name>_v3.<ext> exists → delete (oldest goes)
    - <name>_v2.<ext> exists → rename to <name>_v3.<ext>
    - <name>_v1.<ext> exists → rename to <name>_v2.<ext>
  Then snapshot current: copy <name>.<ext> to <name>_v1.<ext>.

Append ONE audit entry: `VERSION | <n> files | OK`.

--- 2. WIPE TEMP ---

Delete every file in ./output/temp/ (keep the folder). Silent.
One audit entry: `DELETE | wiped <n> files from output/temp/ | OK`.

(No cleanup-review prompt. Files in output/code/, reports/, queries/, data/
are deliverables by rule — they were intentionally written there. Throwaway
work belongs in output/temp/, which just got wiped. Don't ask the user about
deliverables.)

--- 3. CHAT LOG ---

Save user prompts to ./output/prompts/<YYYY-MM-DD>_prompts.md.

SKIP a prompt if BOTH:
  - Under 5 words.
  - Matches confirmation: yes, ok, okay, sure, go, go ahead, proceed, continue,
    do it, do that, fine, good, looks good, sounds good, yep, yeah, k, thanks.

Format:
  # Prompts — YYYY-MM-DD — <user>

  [HH:MM:SS] <prompt verbatim>
  [HH:MM:SS] <prompt verbatim>

Append if today's file already exists.

--- 4. HANDOFF DOC ---

Write ./output/<YYYY-MM-DD>_handoff.md:

  ## Handoff — <DATE TIME>

  ### What We Did
  -
  ### Open / Unfinished
  -
  ### Key Learnings
  -
  ### Carry Forward
  <critical context for next session>

--- 5. WRAP-UP ---

Run /memory show. If anything critical from this session isn't persisted, /memory add it.

Ask ONE question, only if there's something obvious worth persisting beyond memory:
"Anything to add to CONTEXT.md before we close?" If yes, run /context:update.
If nothing obvious, skip this entirely.

(No SESSION-END audit entry — boundaries are not state changes.)

Say: "Session closed."
"""
